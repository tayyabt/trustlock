name: dep-fence

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dep-fence:
    name: Dependency admission check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'   # dep-fence requires Node.js >= 18.3

      - name: Install dep-fence
        run: npm install -g dep-fence

      - name: Run dep-fence check
        run: dep-fence check --enforce
        # Exits 1 if any dependency is blocked by policy.
        # Never advances the baseline in CI (D10).
        # Set NO_COLOR=1 for cleaner CI log output.
        env:
          NO_COLOR: '1'
